{% extends 'base.html' %}
{% block content %}
<div class="container mx-auto p-4 max-w-2xl">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">Record Journal Entry</h1>
    
    <div class="bg-white rounded-xl shadow-lg p-6">
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Date</label>
                <input type="date" name="date" required class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Description / Narration</label>
                <input type="text" name="description" placeholder="e.g. Paid Electricity Bill" required class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Debit Account</label>
                    <select name="dr_account" required class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select Account</option>
                        {% for acc in accounts %}
                            <option value="{{ acc.id }}">{{ acc.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Credit Account</label>
                    <select name="cr_account" required class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select Account</option>
                        {% for acc in accounts %}
                            <option value="{{ acc.id }}">{{ acc.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Amount (₹)</label>
                <input type="number" step="0.01" name="amount" required class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                Record Entry
            </button>
        </form>
    </div>
</div>
{% endblock %}
